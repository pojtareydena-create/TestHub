}], "correct_answer": "B", "explanation": "In y = mx + b, m is the slope. Here m = 3.", "test_id": "69b6b3c412b0d651c6eba640", "order": 3, "id": "69b6b41512b0d651c6eba68d", "created_date": "2026-03-15T13:28:53.353000", "updated_date": "2026-03-15T13:28:53.353000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "Factor: x\u00b2 - 9", "options": [{"label": "A", "text": "(x+3)(x-3)"}, {"label": "B", "text": "(x-9)(x+1)"}, {"label": "C", "text": "(x+9)(x-1)"}, {"label": "D", "text": "(x-3)\u00b2"}], "correct_answer": "A", "explanation": "Difference of squares: a\u00b2\u2212b\u00b2=(a+b)(a\u2212b).", "test_id": "69b6b3c412b0d651c6eba640", "order": 4, "id": "69b6b41512b0d651c6eba68e", "created_date": "2026-03-15T13:28:53.353000", "updated_date": "2026-03-15T13:28:53.353000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "What is the y-intercept of y = 2x - 4?", "options": [{"label": "A", "text": "2"}, {"label": "B", "text": "4"}, {"label": "C", "text": "-4"}, {"label": "D", "text": "-2"}], "correct_answer": "C", "explanation": "The y-intercept is b = -4 (where x = 0).", "test_id": "69b6b3c412b0d651c6eba640", "order": 5, "id": "69b6b41512b0d651c6eba68f", "created_date": "2026-03-15T13:28:53.353000", "updated_date": "2026-03-15T13:28:53.353000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "Newton's First Law states that an object at rest stays at rest unless acted upon by:", "options": [{"label": "A", "text": "Gravity"}, {"label": "B", "text": "An external force"}, {"label": "C", "text": "Friction"}, {"label": "D", "text": "Inertia"}], "correct_answer": "B", "explanation": "Newton's First Law is the law of inertia \u2014 objects need an external force to change state.", "test_id": "69b6b3c412b0d651c6eba645", "order": 1, "id": "69b6b41512b0d651 ssolini"}, {"label": "B", "text": "Stalin"}, {"label": "C", "text": "Hitler"}, {"label": "D", "text": "Hirohito"}], "correct_answer": "C", "explanation": "Adolf Hitler led Nazi Germany from 1933 to 1945.", "test_id": "69b6b3c412b0d651c6eba648", "order": 3, "id": "69b6b41512b0d651c6eba697", "created_date": "2026-03-15T13:28:53.353000", "updated_date": "2026-03-15T13:28:53.353000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "What was the name of the Allied invasion of Normandy?", "options": [{"label": "A", "text": "Operation Barbarossa"}, {"label": "B", "text": "Operation Overlord"}, {"label": "C", "text": "Operation Market Garden"}, {"label": "D", "text": "Operation Sea Lion"}], "correct_answer": "B", "explanation": "D-Day was part of Operation Overlord, June 6, 1944.", "test_id": "69b6b3c412b0d651c6eba648", "order": 4, "id": "69b6b41512b0d651c6eba698", "created_date": "2026-03-15T13:28:53.353000", "updated_date": "2026-03-15T13:28:53.353000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "In which year did World War II end?", "options": [{"label": "A", "text": "1943"}, {"label": "B", "text": "1944"}, {"label": "C", "text": "1945"}, {"label": "D", "text": "1946"}], "correct_answer": "C", "explanation": "WWII ended in 1945 with Germany's surrender in May and Japan's in September.", "test_id": "69b6b3c412b0d651c6eba648", "order": 5, "id": "69b6b41512b0d651c6eba699", "created_date": "2026-03-15T13:28:53.353000", "updated_date": "2026-03-15T13:28:53.353000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "What is the capital of Canada?", "options": [{"label": "A", "text": "Toronto"}, {"label": "B", "text": "Vancouver"}, {"label": "C", "text": "Montreal"}, {"label": "D", "text": "Ottawa"}], "correct_answer": "D", "explanation": "Ottawa is the capital city of Canada.", "test_id": "69b6b3c412b0d651c6eba651", "order": 1, "id": "69b6b41512b0d651c6eba69a", "created_date": "2026-03-15T13:28:53.353000", "updated_date": "2026-03-15T13:28:53.353000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "Which country has the most natural lakes?", "options": [{"label": "A", "text": "Russia"}, {"label": "B", "text": "USA"}, {"label": "C", "text": "Canada"}, {"label": "D", "text": "Finland"}], "correct_answer": "C", "explanation": "Canada has more lakes than any other country.", "test_id": "69b6b3c412b0d651c6eba651", "order": 2, "id": "69b6b41512b0d651c6eba69b", "created_date": "2026-03-15T13:28:53.353000", "updated_date": "2026-03-15T13:28:53.353000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "What is the capital of Japan?", "options": [{"label": "A", "text": "Osaka"}, {"label": "B", "text": "Kyoto"}, {"label": "C", "text": "Hiroshima"}, {"label": "D", "text": "Tokyo"}], "correct_answer": "D", "explanation": "Tokyo is the capital and largest city of Japan.", "test_id": "69b6b3c412b0d651c6eba651", "order": 3, "id": "69b6b41512b0d651c6eba69c", "created_date": "2026-03-15T13:28:53.353000", "updated_date": "2026-03-15T13:28:53.353000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "Which is the smallest country in the world?", "options": [{"label": "A", "text": "Monaco"}, {"label": "B", "text": "San Marino"}, {"label": "C", "text": "Vatican City"}, {"label": "D", "text": "Liechtenstein"}], "correct_answer": "C", "explanation": "Vatican City is the world's smallest country by area.", "test_id": "69b6b3c412b0d651c6eba651", "order": 4, "id": "69b6b41512b0d651c6eba69d", "created_date": "2026-03-15T13:28:53.353000", "updated_date": "2026-03-15T13:28:53.353000", "created_by_id": "69b6b036802b85e : "Cuneiform was the writing system developed by the Sumerians in Mesopotamia.", "test_id": "69b6b1440fa8134488c3a2c2", "order": 2, "id": "69b6b1750fa8134488c3a2d4", "created_date": "2026-03-15T13:17:41.923000", "updated_date": "2026-03-15T13:17:41.923000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "Who was the first Roman Emperor?", "options": [{"label": "A", "text": "Julius Caesar"}, {"label": "B", "text": "Augustus"}, {"label": "C", "text": "Nero"}, {"label": "D", "text": "Caligula"}], "correct_answer": "B", "explanation": "Augustus (Octavian) was the first Roman Emperor, ruling from 27 BCE.", "test_id": "69b6b1440fa8134488c3a2c2", "order": 3, "id": "69b6b1750fa8134488c3a2d5", "created_date": "2026-03-15T13:17:41.923000", "updated_date": "2026-03-15T13:17:41.923000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "The Parthenon was built in which city?", "options": [{"label": "A", "text": "Rome"}, {"label": "B", "text": "Sparta"}, {"label": "C", "text": "Athens"}, {"label": "D", "text": "Troy"}], "correct_answer": "C", "explanation": "The Parthenon was built on the Acropolis of Athens, dedicated to Athena.", "test_id": "69b6b1440fa8134488c3a2c2", "order": 4, "id": "69b6b1750fa8134488c3a2d6", "created_date": "2026-03-15T13:17:41.923000", "updated_date": "2026-03-15T13:17:41.923000", "created_by_id": "69b6b036802b85e99844f2c3", "created_by": "pojtareydena@gmail.com", "is_sample": false}, {"question_text": "Which river was central to Egyptian civilization?", "options": [{"label": "A", "text": "Tigris"}, {"label": "B", "text": "Euphrates"}, {"label": "C", "text": "Nile"}, {"label": "D", "text": "Indus"}], "correct_answer": "C", "explanation": "The Nile River was the lifeline of ancient Egyptian civilization.", "test_id": "69b6b1440fa8134488c3a2c2", "order": 5, "id": "69b6b1750fa8134488c3a2d7", "created_date": " const __origFetch = window.fetch.bind(window);
window.fetch = function(url, opts) {
  const u = typeof url === 'string' ? url : (url.url || '');
  
  // Mock Test entity
  if (u.includes('/entities/Test')) {
    const tests = __STATIC_DATA__.tests;
    // Check for filter with test_id (single test fetch by id)
    const idMatch = u.match(/\/entities\/Test\/([a-f0-9]+)$/);
    if (idMatch) {
      const test = tests.find(t => t.id === idMatch[1]);
      return Promise.resolve(new Response(JSON.stringify(test || null), {status: 200, headers: {'Content-Type': 'application/json'}}));
    }
    return Promise.resolve(new Response(JSON.stringify(tests), {status: 200, headers: {'Content-Type': 'application/json'}}));
  }
  
  // Mock Question entity
  if (u.includes('/entities/Question')) {
    let questions = __STATIC_DATA__.questions;
    // Filter by test_id if present in query
    try {
      const qParam = new URL(u, 'https://x').searchParams.get('q');
      if (qParam) {
        const filter = JSON.parse(qParam);
        if (filter.test_id) {
          questions = questions.filter(q => q.test_id === filter.test_id);
        }
      }
    } catch(e) {}
    // Also check request body
    if (opts && opts.body) {
      try {
        const body = JSON.parse(opts.body);
        if (body && body.test_id) {
          questions = questions.filter(q => q.test_id === body.test_id);
        }
      } catch(e) {}
    }
    const idMatch = u.match(/\/entities\/Question\/([a-f0-9]+)$/);
    if (idMatch) {
      const q = questions.find(q => q.id === idMatch[1]);
      return Promise.resolve(new Response(JSON.stringify(q || null), {status: 200, headers: {'Content-Type': 'application/json'}}));
    }
    return Promise.resolve(new Response(JSON.stringify(questions), {status: 200, headers: {'Content-Type': 'application/json'}}));
  }
  
  // Mock TestResult entity (save results locally)
  if (u.includes('/entities/TestResult')) {
    if (!window.__LOCAL_RESULTS__) window.__LOCAL_RESULTS__ = [];
    if (opts && (opts.method === 'POST' || opts.method === 'PUT')) {
      let body = {};
      try { body = JSON.parse(opts.body); } catch(e) {}
      body.id = body.id || 'local_' + Date.now();
      body.created_date = new Date().toISOString();
      body.updated_date = new Date().toISOString();
      window.__LOCAL_RESULTS__.unshift(body);
      return Promise.resolve(new Response(JSON.stringify(body), {status: 200, headers: {'Content-Type': 'application/json'}}));
    }
    const sorted = [...window.__LOCAL_RESULTS__];
    return Promise.resolve(new Response(JSON.stringify(sorted), {status: 200, headers: {'Content-Type': 'application/json'}}));
  }
  
  // Mock auth/me - return fake user so app doesn't redirect to login
  if (u.includes('/entities/User/me') || u.includes('/auth/me')) {
    const fakeUser = {id: 'local_user', email: 'guest@local', role: 'user', created_date: new Date().toISOString()};
    return Promise.resolve(new Response(JSON.stringify(fakeUser), {status: 200, headers: {'Content-Type': 'application/json'}}));
  }
  
  // Mock public-settings
  if (u.includes('/public-settings')) {
    return Promise.resolve(new Response(JSON.stringify({}), {status: 200, headers: {'Content-Type': 'application/json'}}));
  }
  
  // Block all other base44 API calls silently
  if (u.includes('base44') || u.includes('/api/apps/') || u.includes('/app-logs/')) {
    return Promise.resolve(new Response(JSON.stringify({}), {status: 200, headers: {'Content-Type': 'application/json'}}));
  }
  
  return __origFetch(url, opts);
};
